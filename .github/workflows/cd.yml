name: Publish Python Package
on:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: uv sync
    - name: Build
      run: uv build
    - name: Publish
      run: uv publish
